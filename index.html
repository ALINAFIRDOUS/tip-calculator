<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Tip Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <h3 class="title">Splitr</h3>
    <div class="card">
      <div class="card-container">
        <div class="inputs-section">
        <div class="bill-sec">
            <label for="bill">Bill</label>
            <div class="bill-input">
            <input type="number" step="0.01" min="0" placeholder="0" id="bill" />
              <img src="rupee.png" alt="₹" />
            </div>
            <small class="error" id="billError"></small>
          </div>
          <div class="tip-sec">
            <label for="tip">Select Tip %</label>
            <small class="error" id="tipError"> </small>
            <div class="tip-btns">
              <div>
                <button>5%</button>
                <button>10%</button>
                <button>15%</button>
              </div>
              <div>
                <button>20%</button>
                <button>30%</button>
                <input type="number" placeholder="Custom" id="custom" />
              </div>
            </div>
          </div>
          <div class="people-sec">
            <label for="people">Number of people</label>
            <div class="people-input">
              <input type="number" min="1" step="1" placeholder="0" id="people" />
              <img src="user.png" alt="person" />
            </div>
            <small class="error" id="peopleError"></small>
          </div>
        </div>
        <div class="outputs-section" aria-live="polite">
          <div class="tip-amount">
            <p>Tip<br /><span>/ person</span></p>
            <h2 id="tipAmount">₹0.00</h2>
          </div>
          <div class="total">
            <p>Total <br /><span>/ person</span></p>
            <h2 id="total">₹0.00</h2>
          </div>

          <div class="total-tip">
            <p>Total Tip</p>
            <h2 id="totalTip">₹0.00</h2>
          </div>

          <div class="grand-total">
            <p>Grand Total</p>
            <h2 id="grandTotal">₹0.00</h2>
          </div>
          <button class="reset-btn" id="resetBtn">Reset</button>
        </div>
    </div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
